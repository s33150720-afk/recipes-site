<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מתכון</title>
  <link rel="stylesheet" href="style.css">
  <html lang="he" dir="rtl"></html>
</head>
<body>

  <a href="index.html" class="back-btn">← חזרה למתכונים</a>

  <div class="recipe-card" id="recipe-container">
    <p style="text-align:center; padding:40px; color:#888;">Loading...</p>
  </div>

  <script>
    const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  let currentRecipe = null;

  fetch(`http://localhost:3000/api/recipes/${id}`, {
  headers: { 'Authorization': token }
})
    .then(res => res.json())
    .then(recipe => {
      currentRecipe = recipe;
      document.title = recipe.title;

      const ingredients = recipe.ingredients
        .split('\n')
        .map(i => `<div class="ingredient"><span class="ingredient-amount">•</span><span>${i}</span></div>`)
        .join('');

      const steps = recipe.steps
        .split('\n')
        .map((s, i) => `<div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${s}</div></div>`)
        .join('');

      document.getElementById('recipe-container').innerHTML = `
        <div class="recipe-hero">
          ${recipe.emoji && recipe.emoji.startsWith('/uploads/') 
  ? `<img src="${recipe.emoji}" style="width:100%;height:220px;object-fit:cover;border-radius:0;">` 
  : `<span class="recipe-emoji">${recipe.emoji || '🍽️'}</span>`}
          <div class="recipe-title">${recipe.title}</div>
          <div class="recipe-subtitle">${recipe.description}</div>
        </div>
        <div class="meta-row">
          <div class="meta-item"><div class="meta-value">${recipe.prep_time}</div><div class="meta-label">זמן הכנה</div></div>
          <div class="meta-item"><div class="meta-value">${recipe.difficulty}</div><div class="meta-label">רמה</div></div>
        </div>
        <div class="section">
          <div class="section-title">מצרכים</div>
          ${ingredients}
        </div>
        <div class="section">
          <div class="section-title">אופו הכנה</div>
          ${steps}
        </div>
        <div class="section">
          <button onclick="openEdit()" class="edit-btn">✏️ ערוך מתכון</button>
        </div>
      `;

      document.getElementById('edit-cancel').addEventListener('click', () => {
        document.getElementById('edit-overlay').style.display = 'none';
      });

      document.getElementById('edit-save').addEventListener('click', async () => {
        const updated = {
  emoji: document.getElementById('edit-emoji').value,
  title: document.getElementById('edit-title').value,
  prep_time: document.getElementById('edit-prep_time').value,
  difficulty: document.getElementById('edit-difficulty').value,
  description: document.getElementById('edit-description').value,
  ingredients: document.getElementById('edit-ingredients').value,
  steps: document.getElementById('edit-steps').value,
  category: document.getElementById('edit-category').value,
  dish_type: document.getElementById('edit-dish_type').value,
};

        await fetch(`http://localhost:3000/api/recipes/${id}`, {
  method: 'PUT',
  headers: {
    'Content-Type': 'application/json',
    'Authorization': token
  },
  body: JSON.stringify(updated)
});
           fetch(`http://localhost:3000/api/recipes/${id}`, {
  headers: { 'Authorization': token }
})
        document.getElementById('edit-overlay').style.display = 'none';
        window.location.href = `recipe.html?id=${id}`;
      });
    });

  function openEdit() {
  document.getElementById('edit-emoji').value = currentRecipe.emoji || '';
  document.getElementById('edit-title').value = currentRecipe.title;
  document.getElementById('edit-prep_time').value = currentRecipe.prep_time;
  document.getElementById('edit-difficulty').value = currentRecipe.difficulty;
  document.getElementById('edit-description').value = currentRecipe.description;
  document.getElementById('edit-ingredients').value = currentRecipe.ingredients;
  document.getElementById('edit-steps').value = currentRecipe.steps;
  document.getElementById('edit-category').value = currentRecipe.category || 'פרווה';
  document.getElementById('edit-dish_type').value = currentRecipe.dish_type || 'מנות עיקריות';
  document.getElementById('edit-overlay').style.display = 'flex';
}
</script>
<!-- Edit Recipe Form -->
<div class="overlay" id="edit-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(122,53,32,0.3);justify-content:center;align-items:center;z-index:100;">
  <div class="form-card">
    <h2>✏️ עריכת מתכון</h2>

    <label>Emoji</label>
    <input type="text" id="edit-emoji" maxlength="2">

    <label>כותרת</label>
    <input type="text" id="edit-title">

    <label>זמן הכנה</label>
    <input type="text" id="edit-prep_time">

    <label>רמת קושי</label>
    <select id="edit-difficulty">
      <option>קל</option>
      <option>בינוני</option>
      <option>קשה</option>
    </select>

    <label>קטגוריה</label>
<select id="edit-category">
  <option>פרווה</option>
  <option>חלבי</option>
  <option>בשרי</option>
</select>

<label>סוג מנה</label>
<select id="edit-dish_type">
  <option>מנות עיקריות</option>
  <option>עוגות ועוגיות</option>
  <option>סלטים</option>
  <option>תוספות</option>
  <option>מטבלים</option>
  <option>מרקים</option>
</select>

    <label>תיאור</label>
    <input type="text" id="edit-description">

    <label>מצרכים (אחד לשורה)</label>
    <textarea id="edit-ingredients" rows="4"></textarea>

    <label>אופן הכנה (אחד לשורה)</label>
    <textarea id="edit-steps" rows="4"></textarea>

    <div class="form-buttons">
      <button id="edit-cancel">ביטול</button>
      <button id="edit-save">שמור שינויים</button>
    </div>
  </div>
</div>
</body>
</html>
