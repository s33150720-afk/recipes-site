<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="index.html" class="back-btn">← Back to recipes</a>

  <div class="recipe-card" id="recipe-container">
    <p style="text-align:center; padding:40px; color:#888;">Loading...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    fetch(`http://localhost:3000/api/recipes/${id}`)
      .then(res => res.json())
      .then(recipe => {
        document.title = recipe.title;

        const ingredients = recipe.ingredients
          .split('\n')
          .map(i => `<div class="ingredient"><span class="ingredient-amount">•</span><span>${i}</span></div>`)
          .join('');

        const steps = recipe.steps
          .split('\n')
          .map((s, i) => `<div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${s}</div></div>`)
          .join('');

        document.getElementById('recipe-container').innerHTML = `
          <div class="recipe-hero">
            <span class="recipe-emoji">${recipe.emoji || '🍽️'}</span>
            <div class="recipe-title">${recipe.title}</div>
            <div class="recipe-subtitle">${recipe.description}</div>
          </div>
          <div class="meta-row">
            <div class="meta-item"><div class="meta-value">${recipe.prep_time}</div><div class="meta-label">Prep</div></div>
            <div class="meta-item"><div class="meta-value">${recipe.difficulty}</div><div class="meta-label">Level</div></div>
          </div>
          <div class="section">
            <div class="section-title">Ingredients</div>
            ${ingredients}
          </div>
          <div class="section">
            <div class="section-title">Instructions</div>
            ${steps}
          </div>
        `;
      });
  </script>

</body>
</html>
