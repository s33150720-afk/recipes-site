<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Book</title>
  <link rel="stylesheet" href="home.css">
  <html lang="he" dir="rtl"></html>
</head>
<body>

  <header>

    <div class="user-bar">
<div class="welcome-badge" id="welcome-msg"></div>
  <button onclick="logout()" class="logout-btn">התנתקי</button>
  </div>

<h1><img src="ice-cream.png" style="width:48px; height:48px; vertical-align:middle; margin-right:10px;">ספר המתכונים שלי</h1>    <p>פשוט, מתכונים טעימים מהמטבח שלי</p>
  </header>

  <main>
    <div class="section-label">המתכונים שלי</div>
    <div class="filters">
  <div class="filter-row">
    <button class="filter-btn active" onclick="setKosher('הכל', this)">הכל</button>
    <button class="filter-btn" onclick="setKosher('בשרי', this)">בשרי</button>
    <button class="filter-btn" onclick="setKosher('חלבי', this)">חלבי</button>
    <button class="filter-btn" onclick="setKosher('פרווה', this)">פרווה</button>
  </div>
  <div class="filter-row" id="dish-filters" style="display:none;">
    <button class="filter-btn-dish active" onclick="setDish('הכל', this)">הכל</button>
    <button class="filter-btn-dish" onclick="setDish('מנות עיקריות', this)">מנות עיקריות</button>
    <button class="filter-btn-dish" onclick="setDish('עוגות ועוגיות', this)">עוגות ועוגיות</button>
    <button class="filter-btn-dish" onclick="setDish('סלטים', this)">סלטים</button>
    <button class="filter-btn-dish" onclick="setDish('תוספות', this)">תוספות</button>
    <button class="filter-btn-dish" onclick="setDish('מטבלים', this)">מטבלים</button>
    <button class="filter-btn-dish" onclick="setDish('מרקים', this)">מרקים</button>
  </div>
</div>
 </div>
    <div class="grid" id="recipe-grid"></div>
  </main>

  <!-- Add Recipe Form -->
  <div class="overlay" id="overlay">
    <div class="form-card">
      <h2>✨ מתכון חדש</h2>

      <label>אמוג'י</label>
      <label>תמונה או אימוג'י</label>
<div class="image-or-emoji">
  <input type="text" id="emoji" placeholder="🍕" maxlength="2">
  <span style="font-size:12px;color:#D4856A;margin:0 8px;">או</span>
  <input type="file" id="image-upload" accept="image/*" style="font-size:12px;">
</div>

      <label>כותרת</label>
      <input type="text" id="title" placeholder="Recipe name">

      <label>זמן הכנה</label>
      <input type="text" id="prep_time" placeholder="20 min">

      <label>דרגת קושי</label>
      <select id="difficulty">
        <option>קל</option>
        <option>בינוני</option>
        <option>קשה</option>
      </select>

      <label>קטגוריה</label>
<select id="category">
  <option>פרווה</option>
  <option>חלבי</option>
  <option>בשרי</option>
</select>

<label>סוג מנה</label>
<select id="dish_type">
  <option>מנות עיקריות</option>
  <option>עוגות ועוגיות</option>
  <option>סלטים</option>
  <option>תוספות</option>
  <option>מטבלים</option>
  <option>מרקים</option>
</select>
      <label>תיאור</label>
      <input type="text" id="description" placeholder="One line about the recipe">

      <label>מצרכים (one per line)</label>
      <textarea id="ingredients" rows="4" placeholder="400g chickpeas&#10;3 tbsp tahini"></textarea>

      <label>אופו הכנה (one per line)</label>
      <textarea id="steps" rows="4" placeholder="Blend everything&#10;Add salt to taste"></textarea>

      <div class="form-buttons">
        <button id="cancel-btn">ביטול</button>
        <button id="save-btn">שמור מתכון</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
